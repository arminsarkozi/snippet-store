<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Vault - Cheat Sheet Builder</title>
    <!-- Dependencies -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --accent: #58a6ff;
            --text-secondary: #8b949e;
        }

        body {
            background-color: var(--bg-deep);
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Snippet Truncation Logic */
        .snippet-collapsed {
            max-height: 154px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        .snippet-expanded {
            max-height: none;
            mask-image: none;
            -webkit-mask-image: none;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            background: #161b22 !important;
            font-size: 0.825rem !important;
            padding: 1rem !important;
            border-radius: 0 !important;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: #444c56;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .glass-header {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        input, textarea {
            background: #0d1117;
            border: 1px solid var(--border);
            color: #c9d1d9;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }

        #toast {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 z-[60] bg-blue-600 text-white px-6 py-3 rounded-lg shadow-2xl opacity-0 pointer-events-none translate-y-4 font-bold text-sm">
        Action Successful
    </div>

    <header class="glass-header sticky top-0 z-40 mb-8">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-blue-600/10 rounded-lg">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white tracking-tight">Algorithmic Vault</h1>
                    <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Local ZIP Export Enabled</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="renderSnippets()" placeholder="Filter vault..." class="pl-10 pr-4 py-2 rounded-lg text-sm w-full sm:w-64 bg-black/20">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                
                <button onclick="exportAsZip()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export ZIP
                </button>

                <button onclick="toggleModal(true)" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-900/20 transition-all">
                    <span>New Snippet</span>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-6">
        <div id="snippetsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-32 text-center">
            <div class="p-6 rounded-full bg-slate-900/50 mb-4">
                <svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
            </div>
            <h3 class="text-xl font-semibold text-slate-300">Vault is empty</h3>
            <p class="text-slate-500 mt-2">Add snippets to begin building your local repository.</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-[#0d1117] border border-[#30363d] w-full max-w-3xl rounded-xl shadow-2xl">
            <div class="p-6 border-b border-[#30363d] flex justify-between items-center">
                <h2 class="text-xl font-bold text-white">Add Snippet</h2>
                <button onclick="toggleModal(false)" class="text-slate-500 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-widest font-bold text-slate-500 mb-2">Algorithm Name</label>
                    <input type="text" id="newTitle" placeholder="e.g. Segment Tree" class="w-full px-4 py-3 rounded-lg font-medium">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest font-bold text-slate-500 mb-2">Source Code (C++)</label>
                    <textarea id="newCode" rows="12" placeholder="Paste C++ code here..." class="w-full px-4 py-3 rounded-lg code-font text-sm custom-scrollbar"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-[#30363d] flex justify-end gap-4">
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white px-4 py-2 text-sm font-medium">Cancel</button>
                <button onclick="saveSnippet()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-lg text-sm font-bold transition-all">Save to Vault</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <script>
        let snippets = JSON.parse(localStorage.getItem('algo_vault_snippets') || '[]');

        function notify(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(1rem)';
            }, 3000);
        }

        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden', !show);
            if (show) {
                document.getElementById('newTitle').focus();
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function saveSnippet() {
            const title = document.getElementById('newTitle').value.trim();
            const code = document.getElementById('newCode').value.trim();
            if (!title || !code) return;

            const newSnippet = {
                id: Date.now(),
                title,
                code,
                expanded: false,
                timestamp: new Date().toLocaleDateString()
            };

            snippets.unshift(newSnippet);
            updateStorage();
            document.getElementById('newTitle').value = '';
            document.getElementById('newCode').value = '';
            toggleModal(false);
            renderSnippets();
            notify("Snippet Saved");
        }

        function deleteSnippet(id) {
            const index = snippets.findIndex(s => s.id === id);
            if (index > -1 && confirm(`Delete "${snippets[index].title}"?`)) {
                snippets.splice(index, 1);
                updateStorage();
                renderSnippets();
                notify("Snippet Deleted");
            }
        }

        function toggleExpand(id) {
            const index = snippets.findIndex(s => s.id === id);
            snippets[index].expanded = !snippets[index].expanded;
            renderSnippets();
        }

        function copyCode(id) {
            const snippet = snippets.find(s => s.id === id);
            const el = document.createElement('textarea');
            el.value = snippet.code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            notify("Code Copied to Clipboard");
        }

        async function exportAsZip() {
            if (snippets.length === 0) return alert("Vault is empty.");
            
            const zip = new JSZip();
            const folder = zip.folder("algo-vault-cpp");

            snippets.forEach(s => {
                // Sanitize filename: replace spaces with underscores, remove invalid chars
                const filename = s.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + ".cpp";
                folder.file(filename, s.code);
            });

            const content = await zip.generateAsync({type: "blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `algo-vault-${new Date().toISOString().slice(0,10)}.zip`;
            a.click();
            URL.revokeObjectURL(url);
            notify("ZIP Exported Successfully");
        }

        function updateStorage() {
            localStorage.setItem('algo_vault_snippets', JSON.stringify(snippets));
        }

        function renderSnippets() {
            const grid = document.getElementById('snippetsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = snippets.filter(s => 
                s.title.toLowerCase().includes(searchTerm) || 
                s.code.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = filtered.map(s => `
                <div class="card rounded-xl overflow-hidden shadow-sm">
                    <div class="p-4 flex justify-between items-start gap-3">
                        <div class="flex-grow min-w-0">
                            <h3 class="text-[13px] font-bold text-blue-400 code-font truncate" title="${s.title}">${s.title}</h3>
                            <p class="text-[10px] text-slate-500 font-medium mt-0.5">${s.timestamp || 'Legacy'}</p>
                        </div>
                        <div class="flex gap-3 flex-shrink-0">
                            <button onclick="copyCode(${s.id})" class="text-slate-500 hover:text-white transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                            <button onclick="deleteSnippet(${s.id})" class="text-slate-500 hover:text-red-400 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="relative group">
                        <div class="${s.expanded ? 'snippet-expanded' : 'snippet-collapsed'} bg-[#161b22]">
                            <pre class="language-cpp"><code class="language-cpp">${escapeHtml(s.code)}</code></pre>
                        </div>
                        ${s.code.split('\n').length > 6 ? `
                            <button onclick="toggleExpand(${s.id})" class="w-full py-2 bg-slate-800/40 hover:bg-slate-800/80 text-[10px] font-bold uppercase tracking-widest text-slate-400 border-t border-slate-700/50 transition-colors">
                                ${s.expanded ? 'Collapse ↑' : 'Expand ↓'}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            if (window.Prism) {
                Prism.highlightAll();
            }
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        renderSnippets();
    </script>
</body>
</html>
